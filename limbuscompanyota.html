<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limbus Company Installer</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #1c1c1e;
    }

    p {
      color: #6e6e73;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .install-btn {
      display: inline-block;
      color: white;
      font-size: 20px;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 0.1s ease;
    }

    .install-btn:active {
      transform: scale(0.96);
    }

    /* CHANGE: primary button colors */
    .btn-primary {
      background: #34c759;
      box-shadow: 0 4px 14px rgba(52, 199, 89, 0.35);
    }

    .btn-primary:active {
      background: #28a745;
    }

    /* CHANGE: secondary button colors */
    .btn-secondary {
      background: #007aff;
      box-shadow: 0 4px 14px rgba(0, 122, 255, 0.35);
    }

    .btn-secondary:active {
      background: #005ecb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Limbus Company Installer</h1>
    <p>Tap below to install on this device</p>
    <div class="btn-group">
      <a class="install-btn btn-primary"
         href="https://tinyurl.com/ybx9anjk">
        Install DNS certificate (DO THIS FIRST)
      </a>


      <a class="install-btn btn-secondary"
         href="itms-services://?action=download-manifest&url=https://otagod.github.io/App-OTAs/manifest.plist">
        Install Limbus Company
      </a>
    </div>
  </div>
</body>
</html>
