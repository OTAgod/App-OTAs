<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Install LimbusCompany</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      text-align: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #1c1c1e;
    }

    p {
      color: #6e6e73;
      font-size: 15px;
      margin-bottom: 32px;
    }

    .install-btn {
      display: inline-block;
      background: #007aff;
      color: white;
      font-size: 20px;
      font-weight: 600;
      padding: 18px 48px;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 4px 14px rgba(0, 122, 255, 0.35);
      transition: transform 0.1s ease;
    }

    .install-btn:active {
      transform: scale(0.96);
      background: #005ecb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LimbusCompany</h1>
    <p>Tap below to install on this device</p>
    <a class="install-btn"
       href="itms-services://?action=download-manifest&url=https://otagod.github.io/App-OTAs/manifest.plist">
      Install App
    </a>
  </div>
</body>
</html>
